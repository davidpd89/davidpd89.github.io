name: Update sitemap dates on push

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'

jobs:
  update-sitemap-dates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod to today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Updated sitemap dates to $TODAY"

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet sitemap.xml || (git add sitemap.xml && git commit -m "ci: update sitemap lastmod to $(date -u +%Y-%m-%d)")

      - name: Push sitemap update
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
