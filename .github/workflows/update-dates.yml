name: Update sitemap dates on push

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'

permissions:
  contents: write

jobs:
  update-sitemap-dates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod to today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Updated sitemap dates to $TODAY"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet sitemap.xml; then
            git add sitemap.xml
            git commit -m "ci: update sitemap lastmod to $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          else
            echo "Sitemap already up to date, skipping commit."
          fi
